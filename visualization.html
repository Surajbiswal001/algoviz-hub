<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Interactive Sorting Visualizer</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #visualizationContainer { display: flex; justify-content: center; margin: 20px; }\n        .bar { display: inline-block; margin: 0 1px; background-color: blue; }\n        #statsPanel { margin: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Sorting Algorithm Visualizer</h1>\n    <div>\n        <label for="algorithmSelector">Select Algorithm:</label>\n        <select id="algorithmSelector">\n            <option value="bubble">Bubble Sort</option>\n            <option value="quick">Quick Sort</option>\n            <option value="merge">Merge Sort</option>\n        </select>\n    </div>\n    <div>\n        <label for="arraySize">Array Size:</label>\n        <input type="range" id="arraySize" min="5" max="100" value="50">\n    </div>\n    <div>\n        <label for="speedControl">Speed:</label>\n        <input type="range" id="speedControl" min="1" max="10" step="1" value="5">\n    </div>\n    <div>\n        <label for="inputType">Input Type:</label>\n        <select id="inputType">\n            <option value="random">Random</option>\n            <option value="sorted">Sorted</option>\n        </select>\n    </div>\n    <button id="startButton">Start Visualization</button>\n    <div id="visualizationContainer"></div>\n    <div id="statsPanel">\n        Comparisons: <span id="comparisons">0</span> <br>\n        Swaps: <span id="swaps">0</span> <br>\n        Time: <span id="time">0</span> ms\n    </div>\n    <div id="colorLegend">\n        <div style="width: 20px; height: 20px; background-color: blue; display: inline-block;"></div> Sorted State\n        <div style="width: 20px; height: 20px; background-color: red; display: inline-block;"></div> Current State\n    </div>\n    <script>\n        // JavaScript code for visualization will go here\n    </script>\n</body>\n</html>
